name: Deploy to Azure Functions

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      - name: Install and build
        run: |
          npm install
          npm run build

      - name: Resolve Function App name
        id: resolve_app_name
        env:
          AZURE_FUNCTIONAPP_NAME: ${{ secrets.AZURE_FUNCTIONAPP_NAME }}
          AZURE_FUNCTIONAPP_PUBLISH_PROFILE: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
        run: |
          set -euo pipefail

          APP_NAME="${AZURE_FUNCTIONAPP_NAME:-}"
          PUBLISH_PROFILE="${AZURE_FUNCTIONAPP_PUBLISH_PROFILE:-}"

          if [ -z "$PUBLISH_PROFILE" ]; then
            echo "::error::AZURE_FUNCTIONAPP_PUBLISH_PROFILE secret is missing."
            exit 1
          fi

          if ! node -e '
            const profile = (process.env.AZURE_FUNCTIONAPP_PUBLISH_PROFILE || "").trim();
            if (!/(?:msdeploySite|siteName)="[^"]+"/i.test(profile)) process.exit(1);
          '; then
            echo "::error::AZURE_FUNCTIONAPP_PUBLISH_PROFILE appears malformed."
            exit 1
          fi

          if [ -z "$APP_NAME" ]; then
            APP_NAME="$(node -e '
              const profile = (process.env.AZURE_FUNCTIONAPP_PUBLISH_PROFILE || "").trim();
              const match = profile.match(/(?:msdeploySite|siteName)="([^"]+)"/i);
              process.stdout.write(match && match[1] ? match[1] : "");
            ')"

            if [ -z "$APP_NAME" ]; then
              echo "::error::Unable to derive Function App name from AZURE_FUNCTIONAPP_PUBLISH_PROFILE."
              exit 1
            fi
          fi

          echo "app_name=$APP_NAME" >> "$GITHUB_OUTPUT"

      - name: Validate Kudu access from publish profile
        env:
          AZURE_FUNCTIONAPP_PUBLISH_PROFILE: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
        run: |
          set -euo pipefail

          SCM_INFO="$(node -e '
            const profile = (process.env.AZURE_FUNCTIONAPP_PUBLISH_PROFILE || "").trim();
            const tags = [...profile.matchAll(/<publishProfile\b[^>]*>/gi)].map((m) => m[0]);
            const readAttr = (tag, attr) => {
              const match = tag.match(new RegExp(`${attr}="([^"]+)"`, "i"));
              return match && match[1] ? match[1] : "";
            };

            let fallback = "";
            for (const tag of tags) {
              const publishUrl = readAttr(tag, "publishUrl");
              const userName = readAttr(tag, "userName");
              const userPWD = readAttr(tag, "userPWD");
              if (!publishUrl || !userName || !userPWD) continue;
              const packed = [publishUrl, userName, userPWD].join("\n");
              if (!fallback) fallback = packed;
              if (publishUrl.includes(".scm.")) {
                process.stdout.write(packed);
                process.exit(0);
              }
            }

            process.stdout.write(fallback);
          ')"

          if [ -z "$SCM_INFO" ]; then
            echo "::error::Unable to extract Kudu credentials from AZURE_FUNCTIONAPP_PUBLISH_PROFILE."
            exit 1
          fi

          mapfile -t SCM_LINES <<< "$SCM_INFO"
          SCM_URL="${SCM_LINES[0]:-}"
          SCM_USERNAME="${SCM_LINES[1]:-}"
          SCM_PASSWORD="${SCM_LINES[2]:-}"

          if [ -z "$SCM_URL" ] || [ -z "$SCM_USERNAME" ] || [ -z "$SCM_PASSWORD" ]; then
            echo "::error::Publish profile did not contain complete Kudu credentials."
            exit 1
          fi

          SCM_URL="${SCM_URL#https://}"
          SCM_URL="${SCM_URL#http://}"

          STATUS_CODE="$(curl --silent --show-error --output /dev/null --write-out "%{http_code}" --user "$SCM_USERNAME:$SCM_PASSWORD" "https://${SCM_URL}/api/settings")"

          if [ "$STATUS_CODE" != "200" ]; then
            if [ "$STATUS_CODE" = "401" ]; then
              echo "::error::Publish profile authentication failed against Kudu (401). Re-download the Function App publish profile, update AZURE_FUNCTIONAPP_PUBLISH_PROFILE, and ensure 'SCM Basic Auth Publishing Credentials' is enabled."
            else
              echo "::error::Kudu app settings check failed with status ${STATUS_CODE} using publish profile credentials."
            fi
            exit 1
          fi
      - name: Create deployment package
        run: |
          set -euo pipefail

          PACKAGE_DIR=".azure-functions-package"
          rm -rf "$PACKAGE_DIR"
          mkdir -p "$PACKAGE_DIR"

          cp host.json package.json package-lock.json "$PACKAGE_DIR"/
          cp -R dist node_modules "$PACKAGE_DIR"/

          test -f "$PACKAGE_DIR/host.json"
          test -f "$PACKAGE_DIR/package.json"
          compgen -G "$PACKAGE_DIR/dist/functions/*.js" > /dev/null
          test -d "$PACKAGE_DIR/node_modules/@azure/functions"

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ steps.resolve_app_name.outputs.app_name }}
          package: '.azure-functions-package'
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
          respect-funcignore: false
          scm-do-build-during-deployment: false
